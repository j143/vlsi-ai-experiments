name: Docker Build

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - "copilot/**"
  pull_request:
    branches:
      - main
    paths:
      - "docker/Dockerfile.engine"
      - "docker/Dockerfile.app"
      - "frontend/**"
      - "requirements.txt"
      - "setup.cfg"
      - "vlsi_ai/**"
      - "api/**"
  workflow_dispatch:
    inputs:
      image:
        description: "Which image(s) to build"
        required: true
        default: "both"
        type: choice
        options:
          - engine
          - app
          - both
      push_image:
        description: "Push image to GHCR after build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  # ---------------------------------------------------------------------------
  # Build the engine-only image (vlsi-ai-engine)
  # ---------------------------------------------------------------------------
  build-engine:
    name: Build engine image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.image == 'engine' ||
      inputs.image == 'both'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/vlsi-ai-engine
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}

      - name: Log in to GitHub Container Registry
        if: >
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
          (github.event_name == 'workflow_dispatch' && inputs.push_image == 'true')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push) engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.engine
          push: >-
            ${{
              (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
              (github.event_name == 'workflow_dispatch' && inputs.push_image == 'true')
            }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Build the combined app image (vlsi-ai-app — frontend + backend)
  # ---------------------------------------------------------------------------
  build-app:
    name: Build app image (frontend + backend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.image == 'app' ||
      inputs.image == 'both'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/vlsi-ai-app
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}

      - name: Log in to GitHub Container Registry
        if: >
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
          (github.event_name == 'workflow_dispatch' && inputs.push_image == 'true')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push) app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: >-
            ${{
              (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
              (github.event_name == 'workflow_dispatch' && inputs.push_image == 'true')
            }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
