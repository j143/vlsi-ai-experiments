name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --max-line-length=100 --exclude=.venv,__pycache__,.git

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -m "not requires_ngspice and not slow"

      - name: Check tech_placeholder.yaml is valid YAML
        run: |
          python -c "import yaml; yaml.safe_load(open('config/tech_placeholder.yaml'))"

      - name: Check bandgap specs.yaml is valid YAML
        run: |
          python -c "import yaml; yaml.safe_load(open('bandgap/specs.yaml'))"
