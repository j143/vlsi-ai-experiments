name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Build, lint, and test the React/Vite frontend
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build & lint frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Verify build output exists
        run: test -f dist/index.html

  # ---------------------------------------------------------------------------
  # Job 2 — Lint, test, and validate the Python engine + API
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint & test engine
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint with flake8
        run: |
          flake8 . --max-line-length=100 --exclude=.venv,__pycache__,.git

      - name: Run engine and API tests
        run: |
          pytest tests/ -v --tb=short -m "not requires_ngspice and not slow"

      - name: Check tech_placeholder.yaml is valid YAML
        run: |
          python -c "import yaml; yaml.safe_load(open('config/tech_placeholder.yaml'))"

      - name: Check bandgap specs.yaml is valid YAML
        run: |
          python -c "import yaml; yaml.safe_load(open('bandgap/specs.yaml'))"
