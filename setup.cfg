[flake8]
max-line-length = 100
exclude =
    .venv,
    __pycache__,
    .git,
    build,
    dist,
    *.egg-info
# Ignore: E501 handled by max-line-length, W503 (line break before binary operator)
extend-ignore = W503

[tool:pytest]
testpaths = tests
markers =
    slow: mark test as slow (deselect with -m "not slow")
    requires_ngspice: mark test as requiring ngspice to be installed
